<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">

  <!-- Gradiente -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff5f6d"></stop>
      <stop offset="25%" style="stop-color:#ffc371"></stop>
      <stop offset="50%" style="stop-color:#9be15d"></stop>
      <stop offset="75%" style="stop-color:#00c6ff"></stop>
      <stop offset="100%" style="stop-color:#845ec2"></stop>
    </linearGradient>
  </defs>

  <!-- Hexágono central -->
  <polygon points="100,35 150,65 150,125 100,155 50,125 50,65" fill="none" stroke="url(#grad1)" stroke-width="8"></polygon>

  <!-- Nodos -->
  <circle cx="100" cy="35" r="6" fill="url(#grad1)"></circle>
  <circle cx="150" cy="65" r="6" fill="url(#grad1)"></circle>
  <circle cx="150" cy="125" r="6" fill="url(#grad1)"></circle>
  <circle cx="100" cy="155" r="6" fill="url(#grad1)"></circle>
  <circle cx="50" cy="125" r="6" fill="url(#grad1)"></circle>
  <circle cx="50" cy="65" r="6" fill="url(#grad1)"></circle>

</svg>